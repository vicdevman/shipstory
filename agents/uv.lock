version = 1
revision = 3
requires-python = ">=3.10"

[manifest]
members = [
    "connie-assistant",
    "devin-eng",
    "gigi-marketing",
    "marshall-research",
    "priscilla-product",
    "shared",
    "shipstory-agents",
    "vinci-design",
]

[[package]]
name = "connie-assistant"
version = "0.1.0"
source = { virtual = "connie_assistant" }

[[package]]
name = "devin-eng"
version = "0.1.0"
source = { virtual = "devin_eng" }
dependencies = [
    { name = "shared" },
]

[package.metadata]
requires-dist = [{ name = "shared", editable = "shared" }]

[[package]]
name = "gigi-marketing"
version = "0.1.0"
source = { virtual = "gigi_marketing" }

[[package]]
name = "marshall-research"
version = "0.1.0"
source = { virtual = "marshall_research" }

[[package]]
name = "priscilla-product"
version = "0.1.0"
source = { virtual = "priscilla_product" }

[[package]]
name = "shared"
version = "0.1.0"
source = { editable = "shared" }

[[package]]
name = "shipstory-agents"
version = "0.1.0"
source = { virtual = "." }

[[package]]
name = "vinci-design"
version = "0.1.0"
source = { virtual = "vinci_design" }
